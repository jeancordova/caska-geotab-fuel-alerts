<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Caska Fuel Diagnostics</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 18px; }
        button { margin-right: 6px; margin-bottom: 10px; padding: 6px 10px; }
        #estado { margin: 12px 0; font-weight: bold; }
        pre {
            border: 1px solid #bbb;
            background: #f6f6f6;
            padding: 12px;
            max-width: 1200px;
            min-height: 420px;
            white-space: pre-wrap;
            overflow: auto;
        }
    </style>
</head>
<body>

<h1>Caska Fuel Diagnostics</h1>

<p>Prueba enfocada en lecturas reales de combustible e ignición.</p>

<button onclick="probarApiGeotab()">Probar API Geotab</button>
<button onclick="consultarFuelUnits()">Consultar FuelUnits + Ignición</button>
<button onclick="limpiarSalida()">Limpiar</button>

<div id="estado">Estado: esperando API de MyGeotab...</div>
<pre id="salida"></pre>

<script>
let geotabApi = null;
let geotabState = null;

const DIAGNOSTICO_FUEL_UNITS_ID = "DiagnosticFuelUnitsId";
const DIAGNOSTICO_FUEL_LEVEL_ID = "DiagnosticFuelLevelId";
const DIAGNOSTICO_IGNICION_ID = "DiagnosticIgnitionId";

function actualizarEstado(texto) {
    const estado = document.getElementById("estado");
    if (estado) estado.innerText = texto;
    console.log(texto);
}

function escribirSalida(texto) {
    const salida = document.getElementById("salida");
    if (salida) salida.textContent += texto + "\n";
    console.log(texto);
}

function limpiarSalida() {
    const salida = document.getElementById("salida");
    if (salida) salida.textContent = "";
}

function probarApiGeotab() {
    if (!geotabApi) {
        actualizarEstado("Estado: API Geotab todavía no disponible");
        return;
    }

    limpiarSalida();
    actualizarEstado("Estado: probando conexión con Geotab...");

    geotabApi.call(
        "Get",
        { typeName: "Device", resultsLimit: 5 },
        function (devices) {
            escribirSalida("Conexión correcta con Geotab.");
            escribirSalida("Activos encontrados: " + devices.length);

            devices.forEach(function (device, index) {
                escribirSalida((index + 1) + ". " + (device.name || "Sin nombre") + " | id: " + device.id);
            });

            actualizarEstado("Estado: conexión correcta");
        },
        function (error) {
            escribirSalida("Error al consultar Device:");
            escribirSalida(JSON.stringify(error, null, 2));
            actualizarEstado("Estado: error al probar API");
        }
    );
}

function consultarFuelUnits() {
    if (!geotabApi) {
        actualizarEstado("Estado: API Geotab todavía no disponible");
        return;
    }

    limpiarSalida();
    actualizarEstado("Estado: consultando FuelUnits e ignición...");

    geotabApi.call(
        "Get",
        { typeName: "Device", resultsLimit: 10 },
        function (devices) {
            escribirSalida("Diagnóstico principal de combustible:");
            escribirSalida("id: " + DIAGNOSTICO_FUEL_UNITS_ID);
            escribirSalida("");
            escribirSalida("Diagnóstico alternativo de nivel:");
            escribirSalida("id: " + DIAGNOSTICO_FUEL_LEVEL_ID);
            escribirSalida("");
            escribirSalida("Diagnóstico de ignición:");
            escribirSalida("id: " + DIAGNOSTICO_IGNICION_ID);
            escribirSalida("");

            consultarSiguienteUnidad(devices, 0);
        },
        function (error) {
            escribirSalida("Error al consultar Device:");
            escribirSalida(JSON.stringify(error, null, 2));
            actualizarEstado("Estado: error al cargar activos");
        }
    );
}

function consultarSiguienteUnidad(devices, index) {
    if (index >= devices.length) {
        actualizarEstado("Estado: consulta enfocada terminada");
        return;
    }

    const device = devices[index];
    const ahora = new Date();
    const hace7Dias = new Date(ahora.getTime() - 7 * 24 * 60 * 60 * 1000);

    escribirSalida("========================================");
    escribirSalida("Unidad: " + (device.name || "Sin nombre") + " | id: " + device.id);

    consultarStatusData(device, DIAGNOSTICO_FUEL_UNITS_ID, hace7Dias, ahora, 100, function (fuelUnits) {
        escribirLecturas("FuelUnits", fuelUnits);

        consultarStatusData(device, DIAGNOSTICO_FUEL_LEVEL_ID, hace7Dias, ahora, 100, function (fuelLevel) {
            escribirLecturas("FuelLevel", fuelLevel);

            consultarStatusData(device, DIAGNOSTICO_IGNICION_ID, hace7Dias, ahora, 100, function (ignicion) {
                escribirLecturas("Ignición", ignicion);
                escribirResumenBasico(fuelUnits, ignicion);
                escribirSalida("");
                consultarSiguienteUnidad(devices, index + 1);
            });
        });
    });
}

function consultarStatusData(device, diagnosticId, desde, hasta, limite, callback) {
    geotabApi.call(
        "Get",
        {
            typeName: "StatusData",
            search: {
                deviceSearch: { id: device.id },
                diagnosticSearch: { id: diagnosticId },
                fromDate: desde.toISOString(),
                toDate: hasta.toISOString()
            },
            resultsLimit: limite
        },
        function (datos) {
            datos.sort(function (a, b) {
                return new Date(a.dateTime).getTime() - new Date(b.dateTime).getTime();
            });

            callback(datos);
        },
        function (error) {
            escribirSalida("Error al consultar " + diagnosticId + " para " + (device.name || device.id) + ":");
            escribirSalida(JSON.stringify(error, null, 2));
            callback([]);
        }
    );
}

function escribirLecturas(nombre, datos) {
    escribirSalida(nombre + " | lecturas encontradas: " + datos.length);

    datos.slice(0, 30).forEach(function (dato, index) {
        escribirSalida(
            "  " + (index + 1) +
            ". fecha=" + dato.dateTime +
            " | data=" + dato.data
        );
    });

    if (datos.length > 30) {
        escribirSalida("  ... " + (datos.length - 30) + " lecturas adicionales no mostradas");
    }
}

function escribirResumenBasico(fuelUnits, ignicion) {
    if (!fuelUnits || fuelUnits.length < 2) {
        escribirSalida("Resumen: no hay suficientes lecturas FuelUnits para calcular variación.");
        return;
    }

    const primera = fuelUnits[0];
    const ultima = fuelUnits[fuelUnits.length - 1];
    const diferencia = Number(ultima.data) - Number(primera.data);

    escribirSalida("Resumen FuelUnits:");
    escribirSalida("  primera lectura: " + primera.data + " en " + primera.dateTime);
    escribirSalida("  última lectura: " + ultima.data + " en " + ultima.dateTime);
    escribirSalida("  diferencia total: " + diferencia.toFixed(2));

    let mayorCaida = 0;
    let caidaDesde = null;
    let caidaHasta = null;

    for (let i = 1; i < fuelUnits.length; i++) {
        const anterior = Number(fuelUnits[i - 1].data);
        const actual = Number(fuelUnits[i].data);
        const delta = actual - anterior;

        if (delta < mayorCaida) {
            mayorCaida = delta;
            caidaDesde = fuelUnits[i - 1];
            caidaHasta = fuelUnits[i];
        }
    }

    if (caidaDesde && caidaHasta) {
        escribirSalida("  mayor caída entre lecturas: " + mayorCaida.toFixed(2));
        escribirSalida("  desde: " + caidaDesde.data + " en " + caidaDesde.dateTime);
        escribirSalida("  hasta: " + caidaHasta.data + " en " + caidaHasta.dateTime);
    } else {
        escribirSalida("  no se detectaron caídas entre lecturas consecutivas.");
    }
}

function crearModuloAddIn() {
    return {
        initialize: function (api, state, callback) {
            geotabApi = api;
            geotabState = state;
            actualizarEstado("Estado: API Geotab inicializada");
            callback();
        },

        focus: function (api, state) {
            geotabApi = api;
            geotabState = state;
            actualizarEstado("Estado: Add-In activo");
        },

        blur: function () {
            console.log("Blur ejecutado");
        }
    };
}

window.probarApiGeotab = probarApiGeotab;
window.consultarFuelUnits = consultarFuelUnits;
window.limpiarSalida = limpiarSalida;

geotab.addin.caskaFuelDiagnostics = crearModuloAddIn;
geotab.addin.caska_fuel_diagnostics = crearModuloAddIn;
geotab.addin.caskaGeotabFuelAlerts = crearModuloAddIn;
geotab.addin.caska_geotab_fuel_alerts = crearModuloAddIn;

actualizarEstado("Estado: código cargado, esperando API de MyGeotab...");
</script>

</body>
</html>
