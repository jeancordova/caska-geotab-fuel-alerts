<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Caska Fuel Diagnostics</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 18px; }
        button { margin-right: 6px; margin-bottom: 10px; padding: 6px 10px; }
        #estado { margin: 12px 0; font-weight: bold; }
        pre {
            border: 1px solid #bbb;
            background: #f6f6f6;
            padding: 12px;
            max-width: 1200px;
            min-height: 420px;
            white-space: pre-wrap;
            overflow: auto;
        }
    </style>
</head>
<body>

<h1>Caska Fuel Diagnostics</h1>

<p>Herramienta temporal para encontrar diagnósticos reales de combustible e ignición en MyGeotab.</p>

<button onclick="probarApiGeotab()">Probar API Geotab</button>
<button onclick="buscarDiagnosticos()">Buscar diagnósticos combustible/ignición</button>
<button onclick="escanearStatusData()">Escanear lecturas reales StatusData</button>
<button onclick="limpiarSalida()">Limpiar</button>

<div id="estado">Estado: esperando API de MyGeotab...</div>
<pre id="salida"></pre>

<script>
let geotabApi = null;
let geotabState = null;
let diagnosticosPorId = {};

const PALABRAS_CLAVE = [
    "fuel", "combustible", "gasolina", "diesel",
    "tank", "tanque", "level", "nivel",
    "volume", "volumen", "liters", "litres", "litros",
    "ignition", "ignicion", "ignición", "engine"
];

function actualizarEstado(texto) {
    const estado = document.getElementById("estado");
    if (estado) estado.innerText = texto;
    console.log(texto);
}

function escribirSalida(texto) {
    const salida = document.getElementById("salida");
    if (salida) salida.textContent += texto + "\n";
    console.log(texto);
}

function limpiarSalida() {
    const salida = document.getElementById("salida");
    if (salida) salida.textContent = "";
}

function normalizar(texto) {
    return (texto || "")
        .toString()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
}

function obtenerIdReferencia(ref) {
    if (!ref) return "";
    if (typeof ref === "string") return ref;
    return ref.id || "";
}

function obtenerDiagnosticoDeStatus(statusData) {
    const id = obtenerIdReferencia(statusData.diagnostic);
    return diagnosticosPorId[id] || statusData.diagnostic || { id: id, name: "" };
}

function textoDiagnostico(diagnostic) {
    return normalizar([
        diagnostic.id,
        diagnostic.name,
        diagnostic.source && diagnostic.source.name,
        diagnostic.source,
        diagnostic.unitOfMeasure && diagnostic.unitOfMeasure.name,
        diagnostic.unitOfMeasure
    ].join(" "));
}

function contienePalabraClave(diagnostic) {
    const texto = textoDiagnostico(diagnostic);
    return PALABRAS_CLAVE.some(function (palabra) {
        return texto.includes(normalizar(palabra));
    });
}

function probarApiGeotab() {
    if (!geotabApi) {
        actualizarEstado("Estado: API Geotab todavía no disponible");
        return;
    }

    limpiarSalida();
    actualizarEstado("Estado: probando conexión con Geotab...");

    geotabApi.call(
        "Get",
        { typeName: "Device", resultsLimit: 5 },
        function (devices) {
            escribirSalida("Conexión correcta con Geotab.");
            escribirSalida("Activos encontrados: " + devices.length);

            devices.forEach(function (device, index) {
                escribirSalida((index + 1) + ". " + (device.name || "Sin nombre") + " | id: " + device.id);
            });

            actualizarEstado("Estado: conexión correcta");
        },
        function (error) {
            escribirSalida("Error al consultar Device:");
            escribirSalida(JSON.stringify(error, null, 2));
            actualizarEstado("Estado: error al probar API");
        }
    );
}

function cargarDiagnosticos(callback) {
    geotabApi.call(
        "Get",
        { typeName: "Diagnostic", resultsLimit: 10000 },
        function (diagnostics) {
            diagnosticosPorId = {};
            diagnostics.forEach(function (diagnostic) {
                diagnosticosPorId[diagnostic.id] = diagnostic;
            });
            callback(diagnostics);
        },
        function (error) {
            escribirSalida("Error al cargar Diagnostic:");
            escribirSalida(JSON.stringify(error, null, 2));
            actualizarEstado("Estado: error al cargar diagnósticos");
        }
    );
}

function buscarDiagnosticos() {
    if (!geotabApi) {
        actualizarEstado("Estado: API Geotab todavía no disponible");
        return;
    }

    limpiarSalida();
    actualizarEstado("Estado: consultando diagnósticos...");

    cargarDiagnosticos(function (diagnostics) {
        const encontrados = diagnostics.filter(contienePalabraClave);

        escribirSalida("Diagnósticos totales recibidos: " + diagnostics.length);
        escribirSalida("Diagnósticos candidatos encontrados: " + encontrados.length);
        escribirSalida("");

        encontrados.forEach(function (diagnostic, index) {
            escribirSalida("[" + (index + 1) + "]");
            escribirSalida("id: " + diagnostic.id);
            escribirSalida("name: " + diagnostic.name);
            escribirSalida("source: " + (diagnostic.source && diagnostic.source.name ? diagnostic.source.name : diagnostic.source || ""));
            escribirSalida("unitOfMeasure: " + (diagnostic.unitOfMeasure && diagnostic.unitOfMeasure.name ? diagnostic.unitOfMeasure.name : diagnostic.unitOfMeasure || ""));
            escribirSalida("----------------------------------------");
        });

        actualizarEstado("Estado: diagnóstico terminado");
    });
}

function escanearStatusData() {
    if (!geotabApi) {
        actualizarEstado("Estado: API Geotab todavía no disponible");
        return;
    }

    limpiarSalida();
    actualizarEstado("Estado: cargando diagnósticos y activos...");

    cargarDiagnosticos(function () {
        geotabApi.call(
            "Get",
            { typeName: "Device", resultsLimit: 10 },
            function (devices) {
                if (!devices || devices.length === 0) {
                    escribirSalida("No se encontraron activos.");
                    actualizarEstado("Estado: sin activos");
                    return;
                }

                escribirSalida("Escaneando StatusData real de las primeras " + devices.length + " unidades.");
                escribirSalida("Ventana: últimos 7 días.");
                escribirSalida("Buscando diagnósticos con palabras: combustible, fuel, nivel, litros, tanque, ignition.");
                escribirSalida("");

                escanearSiguienteDispositivo(devices, 0);
            },
            function (error) {
                escribirSalida("Error al consultar Device:");
                escribirSalida(JSON.stringify(error, null, 2));
                actualizarEstado("Estado: error al cargar activos");
            }
        );
    });
}

function escanearSiguienteDispositivo(devices, index) {
    if (index >= devices.length) {
        actualizarEstado("Estado: escaneo StatusData terminado");
        return;
    }

    const device = devices[index];
    const ahora = new Date();
    const hace7Dias = new Date(ahora.getTime() - 7 * 24 * 60 * 60 * 1000);

    escribirSalida("========================================");
    escribirSalida("Unidad: " + (device.name || "Sin nombre") + " | id: " + device.id);

    geotabApi.call(
        "Get",
        {
            typeName: "StatusData",
            search: {
                deviceSearch: { id: device.id },
                fromDate: hace7Dias.toISOString(),
                toDate: ahora.toISOString()
            },
            resultsLimit: 5000
        },
        function (statusData) {
            escribirSalida("StatusData recibidos: " + statusData.length);

            const resumen = {};
            statusData.forEach(function (dato) {
                const diagnostic = obtenerDiagnosticoDeStatus(dato);
                if (!contienePalabraClave(diagnostic)) return;

                const id = diagnostic.id || obtenerIdReferencia(dato.diagnostic);
                if (!resumen[id]) {
                    resumen[id] = {
                        diagnostic: diagnostic,
                        count: 0,
                        samples: []
                    };
                }

                resumen[id].count += 1;

                if (resumen[id].samples.length < 5) {
                    resumen[id].samples.push({
                        dateTime: dato.dateTime,
                        data: dato.data
                    });
                }
            });

            const ids = Object.keys(resumen);

            if (ids.length === 0) {
                escribirSalida("No se encontraron lecturas recientes candidatas de combustible/ignición en esta unidad.");
            } else {
                escribirSalida("Diagnósticos candidatos con datos reales: " + ids.length);
                ids.forEach(function (id) {
                    const item = resumen[id];
                    const diagnostic = item.diagnostic;

                    escribirSalida("");
                    escribirSalida("id: " + id);
                    escribirSalida("name: " + (diagnostic.name || ""));
                    escribirSalida("source: " + (diagnostic.source && diagnostic.source.name ? diagnostic.source.name : diagnostic.source || ""));
                    escribirSalida("unitOfMeasure: " + (diagnostic.unitOfMeasure && diagnostic.unitOfMeasure.name ? diagnostic.unitOfMeasure.name : diagnostic.unitOfMeasure || ""));
                    escribirSalida("lecturas: " + item.count);

                    item.samples.forEach(function (sample, sampleIndex) {
                        escribirSalida("  muestra " + (sampleIndex + 1) + ": fecha=" + sample.dateTime + " | data=" + sample.data);
                    });
                });
            }

            escribirSalida("");
            escanearSiguienteDispositivo(devices, index + 1);
        },
        function (error) {
            escribirSalida("Error al consultar StatusData para " + (device.name || device.id) + ":");
            escribirSalida(JSON.stringify(error, null, 2));
            escribirSalida("");
            escanearSiguienteDispositivo(devices, index + 1);
        }
    );
}

function crearModuloAddIn() {
    return {
        initialize: function (api, state, callback) {
            geotabApi = api;
            geotabState = state;
            actualizarEstado("Estado: API Geotab inicializada");
            callback();
        },

        focus: function (api, state) {
            geotabApi = api;
            geotabState = state;
            actualizarEstado("Estado: Add-In activo");
        },

        blur: function () {
            console.log("Blur ejecutado");
        }
    };
}

window.probarApiGeotab = probarApiGeotab;
window.buscarDiagnosticos = buscarDiagnosticos;
window.escanearStatusData = escanearStatusData;
window.limpiarSalida = limpiarSalida;

geotab.addin.caskaFuelDiagnostics = crearModuloAddIn;
geotab.addin.caska_fuel_diagnostics = crearModuloAddIn;
geotab.addin.caskaGeotabFuelAlerts = crearModuloAddIn;
geotab.addin.caska_geotab_fuel_alerts = crearModuloAddIn;

actualizarEstado("Estado: código cargado, esperando API de MyGeotab...");
</script>

</body>
</html>
