<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Caska Fuel Theft Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 18px; }
        button { margin-right: 6px; margin-bottom: 10px; padding: 6px 10px; }
        #estado { margin: 12px 0; font-weight: bold; }
        pre {
            border: 1px solid #bbb;
            background: #f6f6f6;
            padding: 12px;
            max-width: 1250px;
            min-height: 500px;
            white-space: pre-wrap;
            overflow: auto;
        }
        .nota {
            max-width: 1050px;
            background: #fff7d6;
            border: 1px solid #e1c75a;
            padding: 10px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

<h1>Caska Fuel Theft Test</h1>

<div class="nota">
    Modo prueba hipersensible: detecta consumos normales y ruido como posibles ordenas para validar el flujo.
    El valor de combustible se muestra como unidad reportada por Geotab hasta confirmar su equivalencia exacta.
</div>

<button onclick="probarApiGeotab()">Probar API Geotab</button>
<button onclick="buscarAlertasPrueba()">Buscar posibles ordenas con contexto</button>
<button onclick="limpiarSalida()">Limpiar</button>

<div id="estado">Estado: esperando API de MyGeotab...</div>
<pre id="salida"></pre>

<script>
let geotabApi = null;
let geotabState = null;

const DIAGNOSTICO_FUEL_UNITS_ID = "DiagnosticFuelUnitsId";
const DIAGNOSTICO_IGNICION_ID = "DiagnosticIgnitionId";
const DIAGNOSTICO_VELOCIDAD_ID = "DiagnosticEngineRoadSpeedId";
const DIAGNOSTICO_RPM_ID = "DiagnosticEngineSpeedId";

const BAJA_MINIMA_COMBUSTIBLE_PRUEBA = 1.5;
const VENTANA_MAXIMA_MINUTOS_PRUEBA = 60;
const MINUTOS_REVISION_REBOTE = 20;
const LIMITE_ALERTAS_POR_UNIDAD = 10;

const PRIORIDAD_CLASIFICACION = {
    "Mas sospechosa": 1,
    "Sospechosa": 2,
    "Revisar": 3,
    "Probable consumo normal": 4,
    "Probable ruido de sensor": 5
};

function actualizarEstado(texto) {
    const estado = document.getElementById("estado");
    if (estado) estado.innerText = texto;
    console.log(texto);
}

function escribirSalida(texto) {
    const salida = document.getElementById("salida");
    if (salida) salida.textContent += texto + "\n";
    console.log(texto);
}

function limpiarSalida() {
    const salida = document.getElementById("salida");
    if (salida) salida.textContent = "";
}

function probarApiGeotab() {
    if (!geotabApi) {
        actualizarEstado("Estado: API Geotab todavia no disponible");
        return;
    }

    limpiarSalida();
    actualizarEstado("Estado: probando conexion con Geotab...");

    geotabApi.call(
        "Get",
        { typeName: "Device", resultsLimit: 5 },
        function (devices) {
            escribirSalida("Conexion correcta con Geotab.");
            escribirSalida("Activos encontrados: " + devices.length);

            devices.forEach(function (device, index) {
                escribirSalida((index + 1) + ". " + (device.name || "Sin nombre") + " | id: " + device.id);
            });

            actualizarEstado("Estado: conexion correcta");
        },
        function (error) {
            escribirSalida("Error al consultar Device:");
            escribirSalida(JSON.stringify(error, null, 2));
            actualizarEstado("Estado: error al probar API");
        }
    );
}

function buscarAlertasPrueba() {
    if (!geotabApi) {
        actualizarEstado("Estado: API Geotab todavia no disponible");
        return;
    }

    limpiarSalida();
    actualizarEstado("Estado: buscando posibles ordenas con contexto...");

    geotabApi.call(
        "Get",
        { typeName: "Device", resultsLimit: 10 },
        function (devices) {
            escribirSalida("Modo prueba hipersensible activado.");
            escribirSalida("Combustible candidato: " + DIAGNOSTICO_FUEL_UNITS_ID);
            escribirSalida("Ignicion: " + DIAGNOSTICO_IGNICION_ID);
            escribirSalida("Velocidad: " + DIAGNOSTICO_VELOCIDAD_ID);
            escribirSalida("RPM: " + DIAGNOSTICO_RPM_ID);
            escribirSalida("Regla: baja >= " + BAJA_MINIMA_COMBUSTIBLE_PRUEBA + " unidades reportadas en <= " + VENTANA_MAXIMA_MINUTOS_PRUEBA + " minutos.");
            escribirSalida("Orden: prioridad de sospecha y despues baja mas grande.");
            escribirSalida("");

            consultarSiguienteUnidad(devices, 0);
        },
        function (error) {
            escribirSalida("Error al consultar Device:");
            escribirSalida(JSON.stringify(error, null, 2));
            actualizarEstado("Estado: error al cargar activos");
        }
    );
}

function consultarSiguienteUnidad(devices, index) {
    if (index >= devices.length) {
        actualizarEstado("Estado: busqueda con contexto terminada");
        return;
    }

    const device = devices[index];
    const ahora = new Date();
    const hace7Dias = new Date(ahora.getTime() - 7 * 24 * 60 * 60 * 1000);

    escribirSalida("========================================");
    escribirSalida("Unidad: " + (device.name || "Sin nombre") + " | id: " + device.id);

    consultarStatusData(device, DIAGNOSTICO_FUEL_UNITS_ID, hace7Dias, ahora, 700, function (fuelData) {
        consultarStatusData(device, DIAGNOSTICO_IGNICION_ID, hace7Dias, ahora, 700, function (ignitionData) {
            consultarStatusData(device, DIAGNOSTICO_VELOCIDAD_ID, hace7Dias, ahora, 700, function (speedData) {
                consultarStatusData(device, DIAGNOSTICO_RPM_ID, hace7Dias, ahora, 700, function (rpmData) {
                    analizarUnidad(device, fuelData, ignitionData, speedData, rpmData);
                    escribirSalida("");
                    consultarSiguienteUnidad(devices, index + 1);
                });
            });
        });
    });
}

function consultarStatusData(device, diagnosticId, desde, hasta, limite, callback) {
    geotabApi.call(
        "Get",
        {
            typeName: "StatusData",
            search: {
                deviceSearch: { id: device.id },
                diagnosticSearch: { id: diagnosticId },
                fromDate: desde.toISOString(),
                toDate: hasta.toISOString()
            },
            resultsLimit: limite
        },
        function (datos) {
            datos.sort(function (a, b) {
                return new Date(a.dateTime).getTime() - new Date(b.dateTime).getTime();
            });
            callback(datos);
        },
        function (error) {
            escribirSalida("Error al consultar " + diagnosticId + " para " + (device.name || device.id) + ":");
            escribirSalida(JSON.stringify(error, null, 2));
            callback([]);
        }
    );
}

function analizarUnidad(device, fuelData, ignitionData, speedData, rpmData) {
    escribirSalida("Lecturas combustible candidato: " + fuelData.length);
    escribirSalida("Lecturas Ignicion: " + ignitionData.length);
    escribirSalida("Lecturas Velocidad: " + speedData.length);
    escribirSalida("Lecturas RPM: " + rpmData.length);

    if (fuelData.length < 2) {
        escribirSalida("Sin suficientes lecturas de combustible para analizar.");
        return;
    }

    let alertas = [];

    for (let i = 1; i < fuelData.length; i++) {
        const anterior = fuelData[i - 1];
        const actual = fuelData[i];

        const valorAntes = Number(anterior.data);
        const valorDespues = Number(actual.data);

        if (isNaN(valorAntes) || isNaN(valorDespues)) continue;

        const baja = valorAntes - valorDespues;
        const minutos = diferenciaMinutos(anterior.dateTime, actual.dateTime);

        if (baja >= BAJA_MINIMA_COMBUSTIBLE_PRUEBA && minutos <= VENTANA_MAXIMA_MINUTOS_PRUEBA) {
            const contexto = construirContextoAlerta(
                anterior,
                actual,
                fuelData,
                ignitionData,
                speedData,
                rpmData
            );

            alertas.push({
                unidad: device.name || device.id,
                desdeFecha: anterior.dateTime,
                hastaFecha: actual.dateTime,
                valorAntes: valorAntes,
                valorDespues: valorDespues,
                baja: baja,
                minutos: minutos,
                contexto: contexto
            });
        }
    }

    if (alertas.length === 0) {
        escribirSalida("Sin alertas de prueba detectadas.");
        return;
    }

    ordenarAlertasPorPrioridad(alertas);

    escribirSalida("ALERTAS DE PRUEBA DETECTADAS: " + alertas.length);
    escribirResumenClasificaciones(alertas);

    alertas.slice(0, LIMITE_ALERTAS_POR_UNIDAD).forEach(function (alerta, index) {
        escribirSalida("");
        escribirSalida("ALERTA #" + (index + 1));
        escribirSalida("Unidad: " + alerta.unidad);
        escribirSalida("Clasificacion: " + alerta.contexto.clasificacion);
        escribirSalida("Motivo: " + alerta.contexto.motivo);
        escribirSalida("Baja combustible: " + alerta.baja.toFixed(2) + " unidades reportadas");
        escribirSalida("Valor antes: " + alerta.valorAntes);
        escribirSalida("Valor despues: " + alerta.valorDespues);
        escribirSalida("Ventana: " + alerta.minutos.toFixed(1) + " minutos");
        escribirSalida("Desde: " + alerta.desdeFecha);
        escribirSalida("Hasta: " + alerta.hastaFecha);
        escribirSalida("Ignicion estimada durante intervalo: " + alerta.contexto.estadoIgnicion);
        escribirSalida("Velocidad max/prom: " + formatearEstadistica(alerta.contexto.velocidad));
        escribirSalida("RPM max/prom: " + formatearEstadistica(alerta.contexto.rpm));
        escribirSalida("Rebote posterior: " + alerta.contexto.reboteTexto);
    });

    if (alertas.length > LIMITE_ALERTAS_POR_UNIDAD) {
        escribirSalida("");
        escribirSalida("Hay " + (alertas.length - LIMITE_ALERTAS_POR_UNIDAD) + " alertas adicionales no mostradas para esta unidad.");
    }
}

function ordenarAlertasPorPrioridad(alertas) {
    alertas.sort(function (a, b) {
        const prioridadA = PRIORIDAD_CLASIFICACION[a.contexto.clasificacion] || 99;
        const prioridadB = PRIORIDAD_CLASIFICACION[b.contexto.clasificacion] || 99;

        if (prioridadA !== prioridadB) {
            return prioridadA - prioridadB;
        }

        if (b.baja !== a.baja) {
            return b.baja - a.baja;
        }

        return new Date(a.desdeFecha).getTime() - new Date(b.desdeFecha).getTime();
    });
}

function escribirResumenClasificaciones(alertas) {
    const resumen = {
        "Mas sospechosa": 0,
        "Sospechosa": 0,
        "Revisar": 0,
        "Probable consumo normal": 0,
        "Probable ruido de sensor": 0
    };

    alertas.forEach(function (alerta) {
        const clasificacion = alerta.contexto.clasificacion;
        if (resumen[clasificacion] === undefined) {
            resumen[clasificacion] = 0;
        }
        resumen[clasificacion] += 1;
    });

    escribirSalida("Resumen por clasificacion:");
    escribirSalida("  Mas sospechosa: " + resumen["Mas sospechosa"]);
    escribirSalida("  Sospechosa: " + resumen["Sospechosa"]);
    escribirSalida("  Revisar: " + resumen["Revisar"]);
    escribirSalida("  Probable consumo normal: " + resumen["Probable consumo normal"]);
    escribirSalida("  Probable ruido de sensor: " + resumen["Probable ruido de sensor"]);
}

function construirContextoAlerta(fuelAntes, fuelDespues, fuelData, ignitionData, speedData, rpmData) {
    const desde = new Date(fuelAntes.dateTime);
    const hasta = new Date(fuelDespues.dateTime);

    const velocidadIntervalo = filtrarPorIntervalo(speedData, desde, hasta);
    const rpmIntervalo = filtrarPorIntervalo(rpmData, desde, hasta);

    const estadoIgnicion = estimarEstadoIgnicion(ignitionData, desde, hasta);
    const velocidad = estadisticasNumericas(velocidadIntervalo);
    const rpm = estadisticasNumericas(rpmIntervalo);
    const rebote = detectarRebote(fuelDespues, fuelData);

    return clasificarAlerta({
        estadoIgnicion: estadoIgnicion,
        velocidad: velocidad,
        rpm: rpm,
        rebote: rebote
    });
}

function clasificarAlerta(contexto) {
    const hayVelocidad = contexto.velocidad.tieneDatos && contexto.velocidad.max > 5;
    const hayRpm = contexto.rpm.tieneDatos && contexto.rpm.max > 900;
    const sinDatosMovimiento = !contexto.velocidad.tieneDatos && !contexto.rpm.tieneDatos;

    let clasificacion = "Sospechosa";
    let motivo = "Baja de combustible sin explicacion clara por movimiento o rebote.";

    if (contexto.rebote.hayRebote) {
        clasificacion = "Probable ruido de sensor";
        motivo = "El valor de combustible se recupero despues de la baja dentro de la ventana de revision.";
    } else if (hayVelocidad || hayRpm) {
        clasificacion = "Probable consumo normal";
        motivo = "Hay velocidad o RPM durante el intervalo, compatible con uso normal.";
    } else if (sinDatosMovimiento && contexto.estadoIgnicion === "encendida") {
        clasificacion = "Revisar";
        motivo = "Ignicion encendida, pero no hubo datos de velocidad/RPM dentro del intervalo.";
    } else if (contexto.estadoIgnicion === "apagada") {
        clasificacion = "Mas sospechosa";
        motivo = "La baja parece ocurrir con ignicion apagada y sin recuperacion posterior.";
    } else if (contexto.estadoIgnicion === "encendida") {
        clasificacion = "Revisar";
        motivo = "Ignicion encendida, pero velocidad/RPM disponibles no explican la baja.";
    }

    return {
        clasificacion: clasificacion,
        motivo: motivo,
        estadoIgnicion: contexto.estadoIgnicion,
        velocidad: contexto.velocidad,
        rpm: contexto.rpm,
        reboteTexto: contexto.rebote.texto
    };
}

function filtrarPorIntervalo(datos, desde, hasta) {
    return datos.filter(function (dato) {
        const fecha = new Date(dato.dateTime);
        return fecha >= desde && fecha <= hasta;
    });
}

function estadisticasNumericas(datos) {
    const valores = datos
        .map(function (dato) { return Number(dato.data); })
        .filter(function (valor) { return !isNaN(valor); });

    if (valores.length === 0) {
        return {
            tieneDatos: false,
            max: null,
            prom: null,
            cantidad: 0
        };
    }

    const suma = valores.reduce(function (acc, valor) { return acc + valor; }, 0);
    const max = Math.max.apply(null, valores);

    return {
        tieneDatos: true,
        max: max,
        prom: suma / valores.length,
        cantidad: valores.length
    };
}

function formatearEstadistica(estadistica) {
    if (!estadistica || !estadistica.tieneDatos) {
        return "sin datos";
    }

    return estadistica.max.toFixed(1) + " / " + estadistica.prom.toFixed(1) + " (" + estadistica.cantidad + " lecturas)";
}

function estimarEstadoIgnicion(ignitionData, desde, hasta) {
    if (!ignitionData || ignitionData.length === 0) {
        return "sin dato";
    }

    let ultimoAntes = null;
    let eventosDentro = [];

    ignitionData.forEach(function (dato) {
        const fecha = new Date(dato.dateTime);

        if (fecha <= desde) {
            if (!ultimoAntes || fecha > new Date(ultimoAntes.dateTime)) {
                ultimoAntes = dato;
            }
        }

        if (fecha >= desde && fecha <= hasta) {
            eventosDentro.push(dato);
        }
    });

    if (eventosDentro.length > 0) {
        const ultimoDentro = eventosDentro[eventosDentro.length - 1];
        return Number(ultimoDentro.data) === 1 ? "encendida" : "apagada";
    }

    if (ultimoAntes) {
        return Number(ultimoAntes.data) === 1 ? "encendida" : "apagada";
    }

    return "sin dato";
}

function detectarRebote(fuelDespues, fuelData) {
    const fechaBaja = new Date(fuelDespues.dateTime);
    const valorDespues = Number(fuelDespues.data);
    const limite = new Date(fechaBaja.getTime() + MINUTOS_REVISION_REBOTE * 60000);

    const posteriores = fuelData.filter(function (dato) {
        const fecha = new Date(dato.dateTime);
        return fecha > fechaBaja && fecha <= limite;
    });

    let maxPosterior = valorDespues;

    posteriores.forEach(function (dato) {
        const valor = Number(dato.data);
        if (!isNaN(valor) && valor > maxPosterior) {
            maxPosterior = valor;
        }
    });

    const recuperacion = maxPosterior - valorDespues;
    const hayRebote = recuperacion >= 1.0;

    if (hayRebote) {
        return {
            hayRebote: true,
            texto: "si, recupero " + recuperacion.toFixed(2) + " unidades reportadas en " + MINUTOS_REVISION_REBOTE + " min"
        };
    }

    return {
        hayRebote: false,
        texto: "no"
    };
}

function diferenciaMinutos(fechaA, fechaB) {
    return Math.abs(new Date(fechaB).getTime() - new Date(fechaA).getTime()) / 60000;
}

function crearModuloAddIn() {
    return {
        initialize: function (api, state, callback) {
            geotabApi = api;
            geotabState = state;
            actualizarEstado("Estado: API Geotab inicializada");
            callback();
        },

        focus: function (api, state) {
            geotabApi = api;
            geotabState = state;
            actualizarEstado("Estado: Add-In activo");
        },

        blur: function () {
            console.log("Blur ejecutado");
        }
    };
}

window.probarApiGeotab = probarApiGeotab;
window.buscarAlertasPrueba = buscarAlertasPrueba;
window.limpiarSalida = limpiarSalida;

geotab.addin.caskaFuelDiagnostics = crearModuloAddIn;
geotab.addin.caska_fuel_diagnostics = crearModuloAddIn;
geotab.addin.caskaGeotabFuelAlerts = crearModuloAddIn;
geotab.addin.caska_geotab_fuel_alerts = crearModuloAddIn;

actualizarEstado("Estado: codigo cargado, esperando API de MyGeotab...");
</script>

</body>
</html>
