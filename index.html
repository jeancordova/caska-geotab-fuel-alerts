<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Caska Fuel Theft Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 18px; }
        button { margin-right: 6px; margin-bottom: 10px; padding: 6px 10px; }
        #estado { margin: 12px 0; font-weight: bold; }
        pre {
            border: 1px solid #bbb;
            background: #f6f6f6;
            padding: 12px;
            max-width: 1200px;
            min-height: 460px;
            white-space: pre-wrap;
            overflow: auto;
        }
        .nota {
            max-width: 1000px;
            background: #fff7d6;
            border: 1px solid #e1c75a;
            padding: 10px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

<h1>Caska Fuel Theft Test</h1>

<div class="nota">
    Modo prueba: este algoritmo esta configurado para detectar consumos normales como posible ordena.
    No usar estos umbrales en produccion.
</div>

<button onclick="probarApiGeotab()">Probar API Geotab</button>
<button onclick="buscarAlertasPrueba()">Buscar posibles ordenas de prueba</button>
<button onclick="limpiarSalida()">Limpiar</button>

<div id="estado">Estado: esperando API de MyGeotab...</div>
<pre id="salida"></pre>

<script>
let geotabApi = null;
let geotabState = null;

const DIAGNOSTICO_FUEL_UNITS_ID = "DiagnosticFuelUnitsId";
const DIAGNOSTICO_IGNICION_ID = "DiagnosticIgnitionId";

/*
  UMBRALES DE PRUEBA, INTENCIONALMENTE SENSIBLES:
  La meta es provocar alertas con consumo normal/ruido.
*/
const CAIDA_MINIMA_LITROS_PRUEBA = 1.5;
const VENTANA_MAXIMA_MINUTOS_PRUEBA = 60;
const LIMITE_ALERTAS_POR_UNIDAD = 10;

function actualizarEstado(texto) {
    const estado = document.getElementById("estado");
    if (estado) estado.innerText = texto;
    console.log(texto);
}

function escribirSalida(texto) {
    const salida = document.getElementById("salida");
    if (salida) salida.textContent += texto + "\n";
    console.log(texto);
}

function limpiarSalida() {
    const salida = document.getElementById("salida");
    if (salida) salida.textContent = "";
}

function probarApiGeotab() {
    if (!geotabApi) {
        actualizarEstado("Estado: API Geotab todavia no disponible");
        return;
    }

    limpiarSalida();
    actualizarEstado("Estado: probando conexion con Geotab...");

    geotabApi.call(
        "Get",
        { typeName: "Device", resultsLimit: 5 },
        function (devices) {
            escribirSalida("Conexion correcta con Geotab.");
            escribirSalida("Activos encontrados: " + devices.length);

            devices.forEach(function (device, index) {
                escribirSalida((index + 1) + ". " + (device.name || "Sin nombre") + " | id: " + device.id);
            });

            actualizarEstado("Estado: conexion correcta");
        },
        function (error) {
            escribirSalida("Error al consultar Device:");
            escribirSalida(JSON.stringify(error, null, 2));
            actualizarEstado("Estado: error al probar API");
        }
    );
}

function buscarAlertasPrueba() {
    if (!geotabApi) {
        actualizarEstado("Estado: API Geotab todavia no disponible");
        return;
    }

    limpiarSalida();
    actualizarEstado("Estado: buscando posibles ordenas de prueba...");

    geotabApi.call(
        "Get",
        { typeName: "Device", resultsLimit: 10 },
        function (devices) {
            escribirSalida("Modo prueba hipersensible activado.");
            escribirSalida("Diagnostico combustible: " + DIAGNOSTICO_FUEL_UNITS_ID);
            escribirSalida("Diagnostico ignicion: " + DIAGNOSTICO_IGNICION_ID);
            escribirSalida("Regla de prueba: caida >= " + CAIDA_MINIMA_LITROS_PRUEBA + " litros en <= " + VENTANA_MAXIMA_MINUTOS_PRUEBA + " minutos.");
            escribirSalida("");

            consultarSiguienteUnidad(devices, 0);
        },
        function (error) {
            escribirSalida("Error al consultar Device:");
            escribirSalida(JSON.stringify(error, null, 2));
            actualizarEstado("Estado: error al cargar activos");
        }
    );
}

function consultarSiguienteUnidad(devices, index) {
    if (index >= devices.length) {
        actualizarEstado("Estado: busqueda de alertas terminada");
        return;
    }

    const device = devices[index];
    const ahora = new Date();
    const hace7Dias = new Date(ahora.getTime() - 7 * 24 * 60 * 60 * 1000);

    escribirSalida("========================================");
    escribirSalida("Unidad: " + (device.name || "Sin nombre") + " | id: " + device.id);

    consultarStatusData(device, DIAGNOSTICO_FUEL_UNITS_ID, hace7Dias, ahora, 500, function (fuelData) {
        consultarStatusData(device, DIAGNOSTICO_IGNICION_ID, hace7Dias, ahora, 500, function (ignitionData) {
            analizarUnidad(device, fuelData, ignitionData);
            escribirSalida("");
            consultarSiguienteUnidad(devices, index + 1);
        });
    });
}

function consultarStatusData(device, diagnosticId, desde, hasta, limite, callback) {
    geotabApi.call(
        "Get",
        {
            typeName: "StatusData",
            search: {
                deviceSearch: { id: device.id },
                diagnosticSearch: { id: diagnosticId },
                fromDate: desde.toISOString(),
                toDate: hasta.toISOString()
            },
            resultsLimit: limite
        },
        function (datos) {
            datos.sort(function (a, b) {
                return new Date(a.dateTime).getTime() - new Date(b.dateTime).getTime();
            });

            callback(datos);
        },
        function (error) {
            escribirSalida("Error al consultar " + diagnosticId + " para " + (device.name || device.id) + ":");
            escribirSalida(JSON.stringify(error, null, 2));
            callback([]);
        }
    );
}

function analizarUnidad(device, fuelData, ignitionData) {
    escribirSalida("Lecturas FuelUnits: " + fuelData.length);
    escribirSalida("Lecturas Ignicion: " + ignitionData.length);

    if (fuelData.length < 2) {
        escribirSalida("Sin suficientes lecturas de combustible para analizar.");
        return;
    }

    let alertas = [];

    for (let i = 1; i < fuelData.length; i++) {
        const anterior = fuelData[i - 1];
        const actual = fuelData[i];

        const litrosAntes = Number(anterior.data);
        const litrosDespues = Number(actual.data);

        if (isNaN(litrosAntes) || isNaN(litrosDespues)) continue;

        const caida = litrosAntes - litrosDespues;
        const minutos = diferenciaMinutos(anterior.dateTime, actual.dateTime);

        if (
            caida >= CAIDA_MINIMA_LITROS_PRUEBA &&
            minutos <= VENTANA_MAXIMA_MINUTOS_PRUEBA
        ) {
            alertas.push({
                unidad: device.name || device.id,
                desdeFecha: anterior.dateTime,
                hastaFecha: actual.dateTime,
                litrosAntes: litrosAntes,
                litrosDespues: litrosDespues,
                caida: caida,
                minutos: minutos,
                ignicion: obtenerIgnicionCercana(ignitionData, actual.dateTime)
            });
        }
    }

    if (alertas.length === 0) {
        escribirSalida("Sin alertas de prueba detectadas.");
        return;
    }

    escribirSalida("ALERTAS DE PRUEBA DETECTADAS: " + alertas.length);

    alertas.slice(0, LIMITE_ALERTAS_POR_UNIDAD).forEach(function (alerta, index) {
        escribirSalida("");
        escribirSalida("ALERTA #" + (index + 1));
        escribirSalida("Posible ordena de prueba en unidad " + alerta.unidad);
        escribirSalida("Caida: " + alerta.caida.toFixed(2) + " litros");
        escribirSalida("De: " + alerta.litrosAntes + " litros");
        escribirSalida("A: " + alerta.litrosDespues + " litros");
        escribirSalida("Ventana: " + alerta.minutos.toFixed(1) + " minutos");
        escribirSalida("Desde: " + alerta.desdeFecha);
        escribirSalida("Hasta: " + alerta.hastaFecha);
        escribirSalida("Ignicion cercana: " + describirIgnicion(alerta.ignicion));
    });

    if (alertas.length > LIMITE_ALERTAS_POR_UNIDAD) {
        escribirSalida("");
        escribirSalida("Hay " + (alertas.length - LIMITE_ALERTAS_POR_UNIDAD) + " alertas adicionales no mostradas para esta unidad.");
    }
}

function diferenciaMinutos(fechaA, fechaB) {
    return Math.abs(new Date(fechaB).getTime() - new Date(fechaA).getTime()) / 60000;
}

function obtenerIgnicionCercana(ignitionData, fechaObjetivo) {
    if (!ignitionData || ignitionData.length === 0) return null;

    const objetivoMs = new Date(fechaObjetivo).getTime();
    let mejor = null;
    let mejorDistancia = Infinity;

    ignitionData.forEach(function (dato) {
        const distancia = Math.abs(new Date(dato.dateTime).getTime() - objetivoMs);
        if (distancia < mejorDistancia) {
            mejor = dato;
            mejorDistancia = distancia;
        }
    });

    return mejor;
}

function describirIgnicion(dato) {
    if (!dato) return "sin dato";

    if (Number(dato.data) === 1) {
        return "encendida en " + dato.dateTime;
    }

    if (Number(dato.data) === 0) {
        return "apagada en " + dato.dateTime;
    }

    return dato.data + " en " + dato.dateTime;
}

function crearModuloAddIn() {
    return {
        initialize: function (api, state, callback) {
            geotabApi = api;
            geotabState = state;
            actualizarEstado("Estado: API Geotab inicializada");
            callback();
        },

        focus: function (api, state) {
            geotabApi = api;
            geotabState = state;
            actualizarEstado("Estado: Add-In activo");
        },

        blur: function () {
            console.log("Blur ejecutado");
        }
    };
}

window.probarApiGeotab = probarApiGeotab;
window.buscarAlertasPrueba = buscarAlertasPrueba;
window.limpiarSalida = limpiarSalida;

geotab.addin.caskaFuelDiagnostics = crearModuloAddIn;
geotab.addin.caska_fuel_diagnostics = crearModuloAddIn;
geotab.addin.caskaGeotabFuelAlerts = crearModuloAddIn;
geotab.addin.caska_geotab_fuel_alerts = crearModuloAddIn;

actualizarEstado("Estado: codigo cargado, esperando API de MyGeotab...");
</script>

</body>
</html>
